<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <form class="form1">
      <h1>Sign up</h1>
      <div class="form-content">
        <label for="fname"><i class="fa-regular fa-user"></i>First Name</label>
        <input type="text" id="fname" name="fname" required />
      </div>
      <div class="form-content">
        <label for="lname"><i class="fa-regular fa-user"></i>Last name</label>
        <input type="text" id="lname" name="lname" required />
      </div>
      <div class="form-content">
        <label for="email"><i class="fa-regular fa-envelope"></i>Email</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div class="form-content">
        <label for="password"
          ><i class="fa-regular fa-solid fa-lock"></i>Password</label
        >
        <input type="password" id="password" name="password" required />
      </div>
      <div class="gumb">
        <button class="form-btn">Submit</button>
        <button class="form-btn">Reset</button>
      </div>
    </form>
  </body>
</html>
